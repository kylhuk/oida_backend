storage:
  postgres:
    postgres_db:
      username:
        env: DAGSTER_POSTGRES_USER
      password:
        env: DAGSTER_POSTGRES_PASSWORD
      hostname:
        env: POSTGRES_HOST
      db_name:
        env: DAGSTER_POSTGRES_DB
      port: 5432

run_launcher:
  module: dagster_docker
  class: DockerRunLauncher
  config:
    network: medallion_default
    env_vars:
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - REDIS_URL
      - S3_ENDPOINT
      - S3_PUBLIC_ENDPOINT
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - S3_REGION
      - S3_RAW_BUCKET
      - S3_SILVER_BUCKET
      - S3_GOLD_BUCKET
      - CLICKHOUSE_HOST
      - CLICKHOUSE_PORT
      - CLICKHOUSE_USERNAME
      - CLICKHOUSE_PASSWORD
      - CLICKHOUSE_DATABASE
      - ENABLE_API_KEY_AUTH
      - SEED_DEV_API_KEY
      - DUCKDB_THREADS

telemetry:
  enabled: false
