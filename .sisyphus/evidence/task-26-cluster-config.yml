name: osint-backend-cluster
services:
  clickhouse-01:
    depends_on:
      clickhouse-keeper-1:
        condition: service_started
        required: true
      clickhouse-keeper-2:
        condition: service_started
        required: true
      clickhouse-keeper-3:
        condition: service_started
        required: true
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8123/ping | grep -qx 'Ok.'
      timeout: 5s
      interval: 10s
      retries: 12
    image: clickhouse/clickhouse-server:24.8.14.39
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8123
        published: "19123"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: clickhouse01_data
        target: /var/lib/clickhouse
        volume: {}
      - type: volume
        source: clickhouse01_logs
        target: /var/log/clickhouse-server
        volume: {}
      - type: bind
        source: /home/hal9000/docker/oida_backend/infra/clickhouse/cluster/config/00-cluster-common.xml
        target: /etc/clickhouse-server/config.d/00-cluster-common.xml
        read_only: true
        bind: {}
      - type: bind
        source: /home/hal9000/docker/oida_backend/infra/clickhouse/cluster/config/10-clickhouse-01.xml
        target: /etc/clickhouse-server/config.d/10-node.xml
        read_only: true
        bind: {}
      - type: bind
        source: /home/hal9000/docker/oida_backend/infra/clickhouse/cluster/users/00-cluster-users.xml
        target: /etc/clickhouse-server/users.d/00-cluster-users.xml
        read_only: true
        bind: {}
      - type: bind
        source: /home/hal9000/docker/oida_backend/infra/clickhouse/cluster/backups
        target: /var/lib/clickhouse/user_files
        bind: {}
