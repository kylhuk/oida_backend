name: oida-backend

x-go-service: &go-service
  build:
    context: .
    dockerfile: docker/go.Dockerfile
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_RAW_BUCKET: ${S3_RAW_BUCKET:-raw}
      S3_SILVER_BUCKET: ${S3_SILVER_BUCKET:-stage}
      S3_GOLD_BUCKET: ${S3_GOLD_BUCKET:-backup}
    volumes:
      - ./infra/minio/init:/init:ro
    entrypoint:
      - /bin/sh
      - -c
      - until mc alias set local http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY" >/dev/null 2>&1; do sleep 1; done; /init/create-buckets.sh
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server@sha256:537014a67ce8bf1f5c79c2e2b26fb30b8285a86ffff03875bb14ed17ea35db62
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-gold}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./infra/clickhouse/users/00-compose-users.xml:/etc/clickhouse-server/users.d/zz-compose-users.xml:ro
    ports:
      - "8124:8123"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  bootstrap:
    <<: *go-service
    build:
      context: .
      dockerfile: docker/go.Dockerfile
      args:
        BIN: bootstrap
    command: ["install"]
    environment:
      SOURCE_CATALOG_PATH: seed/source_catalog.json
      SOURCE_REGISTRY_PATH: seed/source_registry.json
      SOURCE_CATALOG_COMPILED_PATH: seed/source_catalog_compiled.json
      SOURCE_REGISTRY_SEED: seed/source_catalog_compiled.json
      API_BOOTSTRAP_KEYS_FILE: seed/api_clients.json
      MIGRATIONS_DIR: migrations/clickhouse
      BACKUP_ASSETS_DIR: infra/backup
      STAGE_ASSETS_DIR: seed/staged
      BOOTSTRAP_READY_MARKER: /ready/bootstrap.ready
      CLICKHOUSE_HTTP_URL: http://svc_bootstrap:bootstrap_change_me@clickhouse:8123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      STAGE_BUCKET: ${STAGE_BUCKET:-stage}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-backup}
      SOURCE_AISSTREAM_API_KEY: ${SOURCE_AISSTREAM_API_KEY}
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    volumes:
      - bootstrap_ready:/ready
    restart: "no"

  http-fixture:
    image: nginx@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
    volumes:
      - ./testdata/http-fixture:/usr/share/nginx/html:ro
    ports:
      - "8079:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/manifest.json >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  control-plane:
    <<: *go-service
    build:
      context: .
      dockerfile: docker/go.Dockerfile
      args:
        BIN: control-plane
    environment:
      CLICKHOUSE_HTTP_URL: http://svc_control_plane:control_plane_change_me@clickhouse:8123
      MINIO_ENDPOINT: http://minio:9000
      S3_ENDPOINT: http://minio:9000
      STAGE_BUCKET: ${STAGE_BUCKET:-stage}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-backup}
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker-fetch:
    <<: *go-service
    build:
      context: .
      dockerfile: docker/go.Dockerfile
      args:
        BIN: worker-fetch
    environment:
      CLICKHOUSE_HTTP_URL: http://svc_worker_fetch:worker_fetch_change_me@clickhouse:8123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker-parse:
    <<: *go-service
    build:
      context: .
      dockerfile: docker/go.Dockerfile
      args:
        BIN: worker-parse
    environment:
      CLICKHOUSE_HTTP_URL: http://svc_worker_parse:worker_parse_change_me@clickhouse:8123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
    depends_on:
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker-aisstream:
    <<: *go-service
    build:
      context: .
      dockerfile: docker/go.Dockerfile
      args:
        BIN: worker-aisstream
    environment:
      SOURCE_AISSTREAM_API_KEY: ${SOURCE_AISSTREAM_API_KEY}
      AISSTREAM_WS_URL: wss://stream.aisstream.io/v0/stream
      CLICKHOUSE_HTTP_URL: http://svc_worker_fetch:worker_fetch_change_me@clickhouse:8123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      RAW_BUCKET: ${S3_RAW_BUCKET:-raw}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker-vesselfinder:
    profiles: ["live-crawl"]
    build:
      context: .
      dockerfile: docker/vesselfinder.Dockerfile
    command: []
    environment:
      CLICKHOUSE_HTTP_URL: http://svc_worker_fetch:worker_fetch_change_me@clickhouse:8123
      WORKERS: ${VESSELFINDER_WORKERS:-3}
      MAX_PAGE: ${VESSELFINDER_MAX_PAGE:-200}
      REDISCOVERY_INTERVAL: ${VESSELFINDER_REDISCOVERY_INTERVAL:-3600s}
      LIST_TIMEOUT: ${VESSELFINDER_LIST_TIMEOUT:-30s}
      DETAIL_TIMEOUT: ${VESSELFINDER_DETAIL_TIMEOUT:-30s}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      RAW_BUCKET: ${S3_RAW_BUCKET:-raw}
      PROXY_SOURCES_FILE: /config/proxies/proxy_sources.txt
      PROXY_REFRESH_INTERVAL: ${VESSELFINDER_PROXY_REFRESH_INTERVAL:-3600s}
      PROXY_VALIDATE_INTERVAL: ${VESSELFINDER_PROXY_VALIDATE_INTERVAL:-300s}
      BROWSER_RECYCLE_AFTER: ${VESSELFINDER_BROWSER_RECYCLE_AFTER:-50}
      CHROME_PROFILE_DIR: /chrome-profile
      RATE_FLOOR_PER_MIN: ${VESSELFINDER_RATE_FLOOR_PER_MIN:-2.0}
      RATE_CEIL_PER_MIN: ${VESSELFINDER_RATE_CEIL_PER_MIN:-6.0}
      RATE_RAMP_DURATION: ${VESSELFINDER_RATE_RAMP_DURATION:-1800s}
      DISCOVERY_FLOOR_RPS: ${VESSELFINDER_DISCOVERY_FLOOR_RPS:-0.1}
      DISCOVERY_CEIL_RPS: ${VESSELFINDER_DISCOVERY_CEIL_RPS:-0.3}
    volumes:
      - ./config/proxies:/config/proxies:ro
      - vessel_chrome_profile:/chrome-profile
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  api:
    <<: *go-service
    build:
      context: .
      dockerfile: docker/go.Dockerfile
      args:
        BIN: api
    environment:
      PORT: "8080"
      BOOTSTRAP_READY_MARKER: /ready/bootstrap.ready
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_API_USER: ${CLICKHOUSE_API_USER:-svc_api}
      CLICKHOUSE_API_PASSWORD: ${CLICKHOUSE_API_PASSWORD:-api_change_me}
      API_RATE_LIMIT_RPS: ${API_RATE_LIMIT_RPS:-25}
      API_RATE_LIMIT_BURST: ${API_RATE_LIMIT_BURST:-100}
      METRICS_SHARED_KEY: ${METRICS_SHARED_KEY:-local_metrics_key_change_me}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      http-fixture:
        condition: service_healthy
    volumes:
      - bootstrap_ready:/ready:ro
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_started
      alertmanager:
        condition: service_started
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager@sha256:51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286
    command: ["--config.file=/etc/alertmanager/alertmanager.yml", "--storage.path=/alertmanager"]
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin_change_me}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  minio_data:
  clickhouse_data:
  bootstrap_ready:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  vessel_chrome_profile:

configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      alerting:
        alertmanagers:
          - static_configs:
              - targets: ["alertmanager:9093"]

      rule_files:
        - /etc/prometheus/alerts.yml

      scrape_configs:
        - job_name: oida-api
          metrics_path: /metrics
          static_configs:
            - targets: ["api:8080"]
          authorization:
            credentials: ${METRICS_SHARED_KEY:-local_metrics_key_change_me}

        - job_name: prometheus
          static_configs:
            - targets: ["localhost:9090"]
