name: medallion

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_RAW_BUCKET: ${S3_RAW_BUCKET:-raw}
      S3_SILVER_BUCKET: ${S3_SILVER_BUCKET:-silver}
      S3_GOLD_BUCKET: ${S3_GOLD_BUCKET:-gold}
    volumes:
      - ./infra/minio/init:/init:ro
    entrypoint: ["/bin/sh", "/init/create-buckets.sh"]
    restart: "no"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USERNAME:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-gold}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      CLICKHOUSE_HOST: clickhouse
      DAGSTER_WEBSERVER_URL: http://dagster-webserver:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: ["uvicorn", "data_platform.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: worker
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: http://minio:9000
      CLICKHOUSE_HOST: clickhouse
      DAGSTER_WEBSERVER_URL: http://dagster-webserver:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command:
      [
        "celery",
        "-A",
        "data_platform.workers.celery_app:celery_app",
        "worker",
        "--loglevel=INFO",
        "--concurrency=2"
      ]
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: worker
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A",
        "data_platform.workers.celery_app:celery_app",
        "flower",
        "--port=5555"
      ]
    ports:
      - "5555:5555"
    restart: unless-stopped

  dagster-code:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: dagster-code
    image: medallion-dagster-code:local
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: http://minio:9000
      CLICKHOUSE_HOST: clickhouse
      DAGSTER_CURRENT_IMAGE: medallion-dagster-code:local
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: dagster-system
    env_file:
      - .env
    environment:
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-platform}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
      POSTGRES_HOST: postgres
      S3_ENDPOINT: http://minio:9000
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    command:
      [
        "dagster-webserver",
        "-h",
        "0.0.0.0",
        "-p",
        "3000",
        "-w",
        "/opt/dagster/dagster_home/workspace.yaml"
      ]
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: dagster-system
    env_file:
      - .env
    environment:
      DAGSTER_POSTGRES_USER: ${POSTGRES_USER:-platform}
      DAGSTER_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
      POSTGRES_HOST: postgres
      S3_ENDPOINT: http://minio:9000
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["dagster-daemon", "run"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
