name: E2E Pipeline Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      COMPOSE_DOCKER_CLI_BUILD: 1
      DOCKER_BUILDKIT: 1
      E2E_API_URL: http://localhost:8080
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Start full stack
        run: |
          docker compose up -d --build
          sleep 30

      - name: Wait for ready
        run: |
          timeout=120
          while [ $timeout -gt 0 ]; do
            if curl -fsS http://localhost:8080/v1/ready; then
              echo "Stack is ready"
              exit 0
            fi
            sleep 5
            timeout=$((timeout - 5))
          done
          echo "Timeout waiting for ready"
          docker compose logs
          exit 1

      - name: Run E2E tests
        run: go test ./test/e2e/... -tags=e2e -v -timeout=10m

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            .sisyphus/evidence/

      - name: Cleanup
        if: always()
        run: docker compose down --remove-orphans --volumes
